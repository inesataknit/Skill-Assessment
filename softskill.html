<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Skill — Self-assessment</title>
<style>
:root { --bg:#ffffff; --surface:#f7f6f2; --border:#e2e0d8; --text:#1a1a18; --muted:#5f5e5a; --hint:#9c9a92; --seg:#378ADD; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; }
h2 { font-size:14px; font-weight:600; margin-bottom:4px; }
.badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
.badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; border:0.5px solid transparent; }
.layout { display:grid; grid-template-columns:1fr 260px; gap:14px; }
@media(max-width:620px){ .layout{grid-template-columns:1fr;} }
.web-wrap { background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:14px; }
.hint { font-size:10px; color:var(--hint); margin-bottom:6px; }
canvas { display:block; width:100%; cursor:crosshair; }
.legend { display:flex; gap:4px; flex-wrap:wrap; margin-top:10px; justify-content:center; }
.lp { font-size:9px; font-weight:600; padding:2px 7px; border-radius:8px; border:0.5px solid transparent; }
.side { display:flex; flex-direction:column; gap:8px; }
.card { background:var(--surface); border:0.5px solid var(--border); border-radius:10px; padding:10px 12px; }
.clbl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--hint); margin-bottom:6px; }
.dim-item { display:flex; align-items:center; gap:6px; padding:5px 7px; border-radius:7px; border:0.5px solid var(--border); background:var(--bg); cursor:pointer; margin-bottom:3px; transition:border-color .12s; }
.dim-item:hover { border-color:#aaa; }
.dim-item.active { border-color:var(--seg); background:#E6F1FB; }
.ddot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dname { font-size:11px; flex:1; }
.dlvl { font-size:9px; font-weight:600; padding:1px 6px; border-radius:6px; border:0.5px solid transparent; }
.evc { display:none; }
.evc.show { display:block; }
textarea { width:100%; font-size:11px; padding:6px 8px; border:0.5px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); font-family:inherit; resize:vertical; min-height:50px; outline:none; line-height:1.5; margin-top:4px; }
textarea:focus { border-color:var(--seg); }
textarea::placeholder { color:var(--hint); }
.grade { font-size:11px; font-weight:600; padding:3px 10px; border-radius:8px; border:0.5px solid transparent; display:inline-block; }
.sync-bar { font-size:10px; padding:5px 8px; border-radius:7px; background:#EAF3DE; color:#27500A; border:0.5px solid #97C459; display:none; }
.pub-btn { width:100%; font-size:12px; font-weight:600; padding:8px; border-radius:8px; border:0.5px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer; font-family:inherit; transition:all .15s; }
.pub-btn:hover { background:#EAF3DE; color:#27500A; border-color:#97C459; }
.pub-btn.done { background:#EAF3DE; color:#27500A; border-color:#97C459; cursor:default; }
</style>
</head>
<body>
<h2>Soft Skill — self-assessment</h2>
<div class="badges">
  <span class="badge" style="background:#E6F1FB;color:#0C447C;border-color:#85B7EB;">Soft Skill · 7 dimensions</span>
  <span class="badge" style="background:#EAF3DE;color:#27500A;border-color:#97C459;">Synced to skill tree</span>
</div>
<div class="layout">
  <div class="web-wrap">
    <div class="hint">Click axis label (blue) to open skill tree · Click axis line to set your level</div>
    <canvas id="c" height="320"></canvas>
    <div class="legend">
      <span class="lp" style="background:#F1EFE8;color:#444441;border-color:#B4B2A9;">1 Novice</span>
      <span class="lp" style="background:#FAEEDA;color:#633806;border-color:#EF9F27;">2 Apprentice</span>
      <span class="lp" style="background:#E6F1FB;color:#0C447C;border-color:#85B7EB;">3 Practitioner</span>
      <span class="lp" style="background:#EAF3DE;color:#27500A;border-color:#97C459;">4 Expert</span>
      <span class="lp" style="background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;">5 Master</span>
    </div>
  </div>
  <div class="side">
    <div class="card"><div class="clbl">Dimensions</div><div id="dimList"></div></div>
    <div class="card evc" id="evCard">
      <div class="clbl">Evidence — <span id="evName" style="color:var(--text);font-weight:600;text-transform:none;letter-spacing:0;font-size:10px;"></span></div>
      <textarea id="evText" placeholder="Describe a concrete example…"></textarea>
    </div>
    <div class="card">
      <div class="clbl">Overall grade</div>
      <span class="grade" id="grade" style="background:#F1EFE8;color:#9c9a92;border-color:#B4B2A9;">Not started</span>
    </div>
    <div class="sync-bar" id="syncBar">Skill tree updated — ratings synced</div>
    <button class="pub-btn" id="pubBtn" onclick="publish()">Publish to manager →</button>
  </div>
</div>

<script>
const STORAGE_KEY='competence_softskill_v1';
const DIMS=[
  {name:'Communication & Facilitation',          link:'https://miro.com/app/board/uXjVGxOLOa4=/?moveToWidget=3458764663964120658&cot=14'},
  {name:'Collaboration & Conflict Management',   link:''},
  {name:'Problem Solving & Decision Making',     link:''},
  {name:'Self-Leadership & Adaptability',        link:''},
  {name:'Stakeholder & Customer Focus',          link:''},
  {name:'Mentoring & Leadership',                link:''},
  {name:'Innovation Mindset & Creative Thinking',link:''},
];
const LM=[
  {bg:'#F1EFE8',text:'#444441',dot:'#888780',label:'Novice'},
  {bg:'#FAEEDA',text:'#633806',dot:'#BA7517',label:'Apprentice'},
  {bg:'#E6F1FB',text:'#0C447C',dot:'#378ADD',label:'Practitioner'},
  {bg:'#EAF3DE',text:'#27500A',dot:'#639922',label:'Expert'},
  {bg:'#EEEDFE',text:'#3C3489',dot:'#7F77DD',label:'Master'},
];
const SEG='#378ADD';
let state, active=null, canvas, ctx, W, cx, cy, R;

function load(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){}
  return DIMS.map(()=>({level:0,evidence:''}));
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    const sb=document.getElementById('syncBar');
    sb.style.display='block';
    clearTimeout(save._t);
    save._t=setTimeout(()=>sb.style.display='none',2500);
  }catch(e){}
}

function init(){
  state=load();
  canvas=document.getElementById('c');
  resize();
  canvas.addEventListener('click',onClick);
  window.addEventListener('resize',()=>{resize();draw();});
}
function resize(){
  const pw=canvas.parentElement.clientWidth-28;
  W=Math.min(pw,400);
  canvas.style.width=W+'px'; canvas.style.height=W+'px';
  cx=W/2; cy=W/2; R=W*.36;
}
function ang(i){return(Math.PI*2*i/DIMS.length)-Math.PI/2;}
function draw(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=W*dpr;
  ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const rings=['rgba(136,135,128,.15)','rgba(186,117,23,.13)','rgba(55,138,221,.13)','rgba(99,153,34,.13)','rgba(127,119,221,.15)'];
  for(let l=5;l>=1;l--){
    const r=R*(l/5); ctx.beginPath();
    for(let i=0;i<DIMS.length;i++){const a=ang(i);i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath(); ctx.fillStyle=rings[l-1]; ctx.fill();
    ctx.strokeStyle='rgba(180,178,169,.4)'; ctx.lineWidth=.5; ctx.stroke();
  }
  for(let i=0;i<DIMS.length;i++){
    const a=ang(i);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*1.04*Math.cos(a),cy+R*1.04*Math.sin(a));
    ctx.strokeStyle='rgba(180,178,169,.45)'; ctx.lineWidth=.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    const lr=R*1.22; const lx=cx+lr*Math.cos(a),ly=cy+lr*Math.sin(a);
    const words=DIMS[i].name.split(' '); const mid=Math.ceil(words.length/2);
    const l1=words.slice(0,mid).join(' '),l2=words.slice(mid).join(' ');
    const hasLink=!!DIMS[i].link; ctx.fillStyle=active===i?'#185FA5':(hasLink?'#378ADD':'#5f5e5a');
    ctx.font=`${active===i?'600':'500'} ${Math.max(9,W*.026)}px system-ui`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    l2?(ctx.fillText(l1,lx,ly-7),ctx.fillText(l2,lx,ly+7)):ctx.fillText(l1,lx,ly);
  }
  if(state.some(s=>s.level>0)){
    ctx.beginPath();
    for(let i=0;i<DIMS.length;i++){const r=R*(Math.max(state[i].level,.08)/5);const a=ang(i);i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath(); ctx.fillStyle=SEG+'22'; ctx.fill(); ctx.strokeStyle=SEG; ctx.lineWidth=1.8; ctx.stroke();
    for(let i=0;i<DIMS.length;i++){
      if(!state[i].level) continue;
      const r=R*(state[i].level/5); const a=ang(i);
      const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
      ctx.beginPath(); ctx.arc(x,y,active===i?8:5.5,0,Math.PI*2);
      ctx.fillStyle=LM[state[i].level-1].dot; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fillStyle='rgba(180,178,169,.6)'; ctx.fill();
}
function onClick(e){
  const rect=canvas.getBoundingClientRect(); const sx=W/rect.width,sy=W/rect.height;
  const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
  let best=-1,bestD=Infinity;
  for(let i=0;i<DIMS.length;i++){
    const a=ang(i),ax=Math.cos(a),ay=Math.sin(a); const dx=mx-cx,dy=my-cy;
    const proj=dx*ax+dy*ay; const px=cx+proj*ax,py=cy+proj*ay;
    const d=Math.hypot(mx-px,my-py); if(d<bestD&&d<44){bestD=d;best=i;}
  }
  if(best===-1) return;
  const a=ang(best),ax=Math.cos(a),ay=Math.sin(a);
  const proj=Math.max(0,Math.min(R,(mx-cx)*ax+(my-cy)*ay));
  state[best].level=Math.max(1,Math.min(5,Math.round(proj/R*5)||1));
  active=best; save(); renderSide(); draw();
  const lr2=R*1.22;
  const lx2=cx+lr2*Math.cos(ang(best)),ly2=cy+lr2*Math.sin(ang(best));
  const distLabel=Math.hypot(mx-lx2,my-ly2);
  if(distLabel<50&&DIMS[best].link){window.open(DIMS[best].link,'_blank');}
}
function renderSide(){
  const list=document.getElementById('dimList'); list.innerHTML='';
  DIMS.forEach((d,i)=>{
    const s=state[i]; const lm=s.level?LM[s.level-1]:null;
    const el=document.createElement('div'); el.className='dim-item'+(active===i?' active':'');
    el.innerHTML=`<div class="ddot" style="background:${lm?lm.dot:'#ccc'}"></div><span class="dname">${d.name}</span>${lm?`<span class="dlvl" style="background:${lm.bg};color:${lm.text};border-color:${lm.dot}">${lm.label}</span>`:'<span class="dlvl" style="color:#aaa">—</span>'}`;
    el.onclick=()=>{active=i;if(!state[i].level)state[i].level=1;save();renderSide();draw();};
    list.appendChild(el);
  });
  const evc=document.getElementById('evCard');
  if(active!==null){
    evc.classList.add('show');
    document.getElementById('evName').textContent=DIMS[active].name.split(' ').slice(0,3).join(' ')+'…';
    const ta=document.getElementById('evText'); ta.value=state[active].evidence;
    ta.oninput=()=>{state[active].evidence=ta.value;save();};
  }
  const rated=state.filter(s=>s.level>0);
  const avg=rated.length?rated.reduce((s,x)=>s+x.level,0)/rated.length:0;
  const gi=Math.min(4,Math.max(0,Math.round(avg)-1)); const lm=avg>0?LM[gi]:null;
  const g=document.getElementById('grade');
  g.textContent=lm?`${lm.label} (${rated.length}/${DIMS.length} rated)`:'Not started';
  g.style.background=lm?lm.bg:'#F1EFE8'; g.style.color=lm?lm.text:'#9c9a92'; g.style.borderColor=lm?lm.dot:'#B4B2A9';
}
function publish(){
  if(state.filter(s=>s.level>0).length<DIMS.length){alert(`Please rate all ${DIMS.length} dimensions first.`);return;}
  document.getElementById('pubBtn').textContent='Published — visible to manager';
  document.getElementById('pubBtn').classList.add('done');
  save();
}
init(); draw(); renderSide();
</script>
</body>
</html>
